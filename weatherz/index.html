<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Weather App</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="bg-default">

  <!-- Background orbs -->
  <div class="bg-orbs" aria-hidden="true">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>

  <div class="app-container">

    <!-- Search Bar -->
    <header class="search-section">
      <h1 class="app-title">Weather</h1>
      <div class="search-bar glass">
        <input
          type="text"
          id="city-input"
          placeholder="Search for a city..."
          autocomplete="off"
        />
        <button id="search-btn" aria-label="Search">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
        </button>
      </div>
    </header>

    <!-- Preset city buttons -->
    <div class="preset-row">
      <button class="preset-btn" data-city="New York">🗽 New York</button>
      <button class="preset-btn" data-city="London">🌧 London</button>
      <button class="preset-btn" data-city="Tokyo">🗼 Tokyo</button>
      <button class="preset-btn" data-city="Sydney">🦘 Sydney</button>
      <button class="preset-btn" data-city="Paris">🗼 Paris</button>
      <button class="preset-btn" data-city="Dubai">🏙 Dubai</button>
    </div>

    <!-- Error message -->
    <div id="error-msg" class="error-msg hidden"></div>

    <!-- Main content (hidden until search) -->
    <main id="weather-content" class="weather-content hidden">

      <!-- Current Weather Card -->
      <section class="card glass current-weather anim-slide-up" style="animation-delay: 0.05s">
        <div class="cw-top">
          <div class="cw-location">
            <h2 id="city-name">--</h2>
            <span id="local-datetime" class="secondary-text">--</span>
          </div>
          <button id="unit-toggle" class="unit-toggle">
            <span id="unit-c" class="unit-opt active">°C</span>
            <span class="unit-sep">/</span>
            <span id="unit-f" class="unit-opt">°F</span>
          </button>
        </div>

        <div class="cw-main">
          <div class="cw-icon-desc">
            <img id="weather-icon" src="" alt="weather icon" />
            <span id="weather-desc" class="weather-desc">--</span>
          </div>
          <div class="cw-temp">
            <span id="temperature" class="temperature">--</span>
            <span id="feels-like" class="secondary-text feels-like">Feels like --</span>
          </div>
        </div>

        <div class="cw-details">
          <div class="detail-item">
            <span class="detail-label">Humidity</span>
            <span id="humidity" class="detail-value">--%</span>
          </div>
          <div class="detail-item">
            <span class="detail-label">Wind</span>
            <span id="wind-speed" class="detail-value">-- km/h</span>
          </div>
          <div class="detail-item">
            <span class="detail-label">Visibility</span>
            <span id="visibility" class="detail-value">-- km</span>
          </div>
        </div>
      </section>

      <!-- Hourly Forecast Card -->
      <section class="card glass hourly-card anim-slide-up" style="animation-delay: 0.15s">
        <h3 class="card-title">Hourly Forecast</h3>
        <div id="hourly-row" class="hourly-row"></div>
      </section>

      <!-- AQI Card -->
      <section class="card glass aqi-card anim-slide-up" style="animation-delay: 0.25s">
        <h3 class="card-title">Air Quality Index</h3>
        <div class="aqi-main">
          <span id="aqi-label" class="aqi-label">--</span>
          <span id="aqi-value" class="secondary-text aqi-sub">AQI --</span>
        </div>
        <div class="aqi-pollutants">
          <div class="pollutant-item">
            <span class="detail-label">PM2.5</span>
            <span id="pm25" class="detail-value">--</span>
          </div>
          <div class="pollutant-item">
            <span class="detail-label">PM10</span>
            <span id="pm10" class="detail-value">--</span>
          </div>
          <div class="pollutant-item">
            <span class="detail-label">NO₂</span>
            <span id="no2" class="detail-value">--</span>
          </div>
          <div class="pollutant-item">
            <span class="detail-label">O₃</span>
            <span id="o3" class="detail-value">--</span>
          </div>
        </div>
      </section>

    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
